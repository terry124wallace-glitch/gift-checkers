<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Verify</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;

  background: linear-gradient(-45deg, #4f46e5, #9333ea, #06b6d4, #3b82f6);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

/* GRADIENT */
@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* PARTICLES */
.particles{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}
.particles span{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  opacity:0.2;
  border-radius:50%;
  animation:move 20s linear infinite;
}
@keyframes move{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(15px);
}
.logo{color:white;font-weight:bold}
.nav button{
  background:white;
  color:#4f46e5;
  border:none;
  padding:10px 16px;
  border-radius:8px;
}

/* HERO */
.hero{
  padding:80px 20px;
}
.hero-inner{
  max-width:1100px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.hero h1{color:white;font-size:48px;}
.hero p{color:#e2e8f0}

/* CARDS */
.cards{
  position:relative;
  width:340px;
  height:320px;
  perspective:1200px;
}
.card-wrap{
  position:absolute;
  width:180px;
  height:110px;
  border-radius:16px;
  overflow:hidden;
}
.card1{top:0;left:90px;z-index:3}
.card2{top:110px;left:20px;z-index:2}
.card3{top:140px;left:160px;z-index:1}

.card-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* REFLECTION */
.shine{
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(
    120deg,
    rgba(255,255,255,0.1) 0%,
    rgba(255,255,255,0.5) 50%,
    rgba(255,255,255,0.1) 100%
  );
  transform:translate(-100%,-100%) rotate(25deg);
  pointer-events:none;
}

/* GLASS */
.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:12px;
  color:white;
  margin:20px;
}

/* TESTIMONIALS */
.slider{
  display:flex;
  overflow-x:auto;
  gap:20px;
}
.testimonial{
  min-width:260px;
  background:rgba(255,255,255,0.15);
  padding:20px;
  border-radius:12px;
  color:white;
}

/* FORM */
.form-box{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:15px;
  max-width:400px;
  margin:40px auto;
  color:white;
}
input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- PARTICLES -->
<div class="particles">
  <span style="left:10%"></span>
  <span style="left:30%"></span>
  <span style="left:50%"></span>
  <span style="left:70%"></span>
  <span style="left:90%"></span>
</div>

<div class="nav">
  <div class="logo">Gift Verify</div>
  <button onclick="scrollToForm()">Try Now</button>
</div>

<section class="hero">
  <div class="hero-inner">

    <div>
      <h1 class="reveal">Validate Your Gift Cards With Confidence</h1>
      <p class="reveal">Fast, simple and secure validation in seconds.</p>
    </div>

    <!-- CARDS -->
    <div class="cards reveal" id="cards">

      <div class="card-wrap card1">
        <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/512px-Amazon_logo.svg.png">
        <div class="shine"></div>
      </div>

      <div class="card-wrap card2">
        <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Apple_logo_black.svg/505px-Apple_logo_black.svg.png">
        <div class="shine"></div>
      </div>

      <div class="card-wrap card3">
        <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/512px-Amazon_logo.svg.png">
        <div class="shine"></div>
      </div>

    </div>

  </div>
</section>

<script>
/* REVEAL */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("active");
    }
  });
});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* REFLECTION FOLLOW MOUSE */
const cards = document.getElementById("cards");
cards.addEventListener("mousemove",(e)=>{
  document.querySelectorAll(".shine").forEach(shine=>{
    shine.style.transform =
      `translate(${e.offsetX}px, ${e.offsetY}px) rotate(25deg)`;
  });
});

/* PARALLAX */
window.addEventListener("scroll",()=>{
  const scroll = window.scrollY;
  cards.style.transform = `translateY(${scroll * -0.05}px)`;
});
</script>

</body>
</html>
